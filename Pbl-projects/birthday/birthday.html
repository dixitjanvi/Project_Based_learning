<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Happy Birthday Siddhi!</title>
  <link rel="stylesheet" href="birthday.css">
</head>
<body>
  <!-- 🎵 Play Button -->
  <button id="playBtn">🎵 Play Birthday Song</button>

  <!-- 🎵 Audio Element -->
  <audio id="bdaySong" loop>
    <source src="birthday_song.mp3" type="audio/mpeg">
    Your browser does not support the audio element.
  </audio>

  <!-- 🎆 Fireworks -->
  <canvas id="fireworks"></canvas>

  <!-- 🎊 Confetti -->
  <canvas id="confetti"></canvas>

  <!-- 💝 Content -->
  <div class="content">
    <h1>🎉 Happy Birthday Siddhi! 🎉</h1>
    <img src="siddhi.jpg" alt="Siddhi's Photo" class="photo">
    <p class="wish">You're not just my friend, you're just like a sister to me,
       may you always stay happy ,joyful and as pure as you've always been, 
      Siddhi! May your day sparkle with joy, laughter, and firecracker! 💖🎇</p>
  </div>

  <script src="birthday.js"></script>
  <script src="confetti.js"></script>
</body>
</html>
