<!DOCTYPE html>
    <html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Form Validation</title>
        <script src="form_validation.js" defer></script>
        <link rel="stylesheet" href="form_validation.css">
    </head>
    <body>
        <form action="" onsubmit="return vform()">
            <input type="Number" name="" id="Num" placeholder="Mobile Number" oninput="validateNumber()">
            <input type="Email" name="" id="Email" placeholder="Email">
            <input type="Password" name="" id="Password" placeholder="Password">
            <input type="Confirm Password" name="" id="Confirm Password" placeholder="Confirm Password">
            <input type="Submit" value="Submit">
        </form>
    </body>
    </html>
