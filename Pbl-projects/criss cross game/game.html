<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tic Tac Toe</title>
    <link rel="stylesheet" href="game.css">
</head>
<body>
    <div id="title">
        <h1>Tic Tac Toe</h1>
    </div>
    <div id="board">
        <div class="square" id="square0" onclick="handleClick(0)"></div>
        <div class="square" id="square1" onclick="handleClick(1)"></div>
        <div class="square" id="square2" onclick="handleClick(2)"></div>
        <div class="square" id="square3" onclick="handleClick(3)"></div>
        <div class="square" id="square4" onclick="handleClick(4)"></div>
        <div class="square" id="square5" onclick="handleClick(5)"></div>
        <div class="square" id="square6" onclick="handleClick(6)"></div>
        <div class="square" id="square7" onclick="handleClick(7)"></div>
        <div class="square" id="square8" onclick="handleClick(8)"></div>
    </div>
    <div id="endgame">
        <input type="button" value="Restart" id="restartButton" onclick="restartGame()"/>
    </div>   
         <script src="game.js"></script> 
</body>
</html>
