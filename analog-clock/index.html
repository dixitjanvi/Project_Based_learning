<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Broken Glass Clock</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #0a0a0a;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      font-family: 'Courier New', monospace;
      overflow: hidden;
    }

    h1 {
      color: #8ab4f8;
      font-size: 1.2rem;
      letter-spacing: 6px;
      text-transform: uppercase;
      margin-bottom: 30px;
      opacity: 0.7;
    }

    .clock-wrapper {
      position: relative;
      width: 320px;
      height: 320px;
    }

    /* ── Clock face ── */
    .clock-face {
      position: absolute;
      inset: 0;
      border-radius: 50%;
      background: radial-gradient(circle at 35% 35%,
        #2a2a3a 0%,
        #111118 60%,
        #0a0a10 100%);
      border: 3px solid #333;
      box-shadow:
        0 0 0 1px #555,
        0 0 40px rgba(100,120,255,0.15),
        inset 0 0 60px rgba(0,0,0,0.8);
      overflow: hidden;
    }

    /* ── Hour markers ── */
    .marker {
      position: absolute;
      top: 50%;
      left: 50%;
      transform-origin: 0 0;
      width: 2px;
      background: #444;
    }
    .marker.major { height: 18px; background: #8ab4f8; width: 3px; margin-top: -130px; margin-left: -1.5px; }
    .marker.minor { height: 10px; margin-top: -125px; margin-left: -1px; }

    /* ── Hands ── */
    .hand {
      position: absolute;
      bottom: 50%;
      left: 50%;
      transform-origin: bottom center;
      border-radius: 4px;
    }
    .hour-hand {
      width: 6px;
      height: 90px;
      margin-left: -3px;
      background: linear-gradient(to top, #8ab4f8, #aac8ff);
      box-shadow: 0 0 10px rgba(138,180,248,0.6);
    }
    .minute-hand {
      width: 4px;
      height: 120px;
      margin-left: -2px;
      background: linear-gradient(to top, #fff, #ddd);
      box-shadow: 0 0 8px rgba(255,255,255,0.5);
    }
    .second-hand {
      width: 2px;
      height: 130px;
      margin-left: -1px;
      background: linear-gradient(to top, #ff4444, #ff8888);
      box-shadow: 0 0 10px rgba(255,68,68,0.8);
    }
    .second-hand::after {
      content: '';
      position: absolute;
      bottom: -20px;
      left: -3px;
      width: 8px;
      height: 20px;
      background: #ff4444;
      border-radius: 2px;
    }

    /* ── Center dot ── */
    .center-dot {
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      width: 14px; height: 14px;
      background: radial-gradient(circle, #fff 30%, #8ab4f8 100%);
      border-radius: 50%;
      z-index: 10;
      box-shadow: 0 0 10px rgba(138,180,248,0.9);
    }

    /* ══════════════════════════════
       BROKEN GLASS OVERLAY
    ══════════════════════════════ */
    .glass-overlay {
      position: absolute;
      inset: 0;
      border-radius: 50%;
      pointer-events: none;
      z-index: 20;
      overflow: hidden;
    }

    /* SVG crack lines */
    .glass-overlay svg {
      width: 100%;
      height: 100%;
    }

    /* Shard highlight (light reflection on broken pieces) */
    .shard {
      position: absolute;
      background: linear-gradient(135deg,
        rgba(255,255,255,0.18) 0%,
        rgba(255,255,255,0.04) 60%,
        transparent 100%);
      clip-path: polygon(var(--pts));
      pointer-events: none;
    }

    /* Overall glass sheen */
    .glass-sheen {
      position: absolute;
      inset: 0;
      border-radius: 50%;
      background: linear-gradient(135deg,
        rgba(255,255,255,0.08) 0%,
        transparent 50%,
        rgba(0,0,0,0.15) 100%);
      pointer-events: none;
    }

    /* Digital time display */
    .digital-time {
      margin-top: 24px;
      color: #8ab4f8;
      font-size: 1.5rem;
      letter-spacing: 4px;
      text-shadow: 0 0 12px rgba(138,180,248,0.8);
    }

    /* Crack flash animation on load */
    @keyframes crackFlash {
      0%   { opacity: 0; filter: brightness(3); }
      20%  { opacity: 1; filter: brightness(1.5); }
      100% { opacity: 1; filter: brightness(1); }
    }
    .glass-overlay { animation: crackFlash 1.2s ease-out forwards; }

    /* Subtle flicker */
    @keyframes flicker {
      0%,100% { opacity: 1; }
      92% { opacity: 0.97; }
      95% { opacity: 0.93; }
      97% { opacity: 0.98; }
    }
    .clock-face { animation: flicker 6s infinite; }
  </style>
</head>
<body>

  <h1>⌚ Broken Glass Clock</h1>

  <div class="clock-wrapper">
    <div class="clock-face" id="clockFace">

      <!-- Hour markers injected by JS -->

      <!-- Clock hands -->
      <div class="hand hour-hand"   id="hourHand"></div>
      <div class="hand minute-hand" id="minuteHand"></div>
      <div class="hand second-hand" id="secondHand"></div>
      <div class="center-dot"></div>
    </div>

    <!-- Broken glass overlay -->
    <div class="glass-overlay">
      <svg viewBox="0 0 320 320" xmlns="http://www.w3.org/2000/svg">
        <!-- Main crack lines radiating from impact point (~200,120) -->
        <g stroke="rgba(200,220,255,0.75)" stroke-width="1.2" fill="none" stroke-linecap="round">
          <!-- Primary cracks -->
          <line x1="200" y1="120" x2="290" y2="60"/>
          <line x1="200" y1="120" x2="310" y2="160"/>
          <line x1="200" y1="120" x2="260" y2="280"/>
          <line x1="200" y1="120" x2="160" y2="300"/>
          <line x1="200" y1="120" x2="50"  y2="220"/>
          <line x1="200" y1="120" x2="30"  y2="130"/>
          <line x1="200" y1="120" x2="80"  y2="30"/>
          <line x1="200" y1="120" x2="175" y2="15"/>

          <!-- Secondary / branching cracks -->
          <line x1="260" y1="85"  x2="300" y2="110"/>
          <line x1="260" y1="85"  x2="240" y2="55"/>
          <line x1="290" y1="180" x2="310" y2="220"/>
          <line x1="230" y1="230" x2="270" y2="260"/>
          <line x1="110" y1="260" x2="80"  y2="290"/>
          <line x1="110" y1="260" x2="140" y2="310"/>
          <line x1="60"  y1="180" x2="25"  y2="200"/>
          <line x1="60"  y1="175" x2="40"  y2="140"/>
          <line x1="100" y1="70"  x2="60"  y2="50"/>
          <line x1="100" y1="70"  x2="120" y2="30"/>
          <line x1="160" y1="40"  x2="145" y2="15"/>

          <!-- Tertiary micro-cracks -->
          <line x1="275" y1="130" x2="305" y2="140" stroke-width="0.7" stroke="rgba(200,220,255,0.45)"/>
          <line x1="215" y1="195" x2="235" y2="215" stroke-width="0.7" stroke="rgba(200,220,255,0.45)"/>
          <line x1="130" y1="225" x2="115" y2="245" stroke-width="0.7" stroke="rgba(200,220,255,0.45)"/>
          <line x1="75"  y1="110" x2="55"  y2="95"  stroke-width="0.7" stroke="rgba(200,220,255,0.45)"/>
          <line x1="180" y1="55"  x2="195" y2="35"  stroke-width="0.7" stroke="rgba(200,220,255,0.45)"/>
        </g>

        <!-- Impact point glow -->
        <circle cx="200" cy="120" r="6" fill="rgba(255,255,255,0.25)"/>
        <circle cx="200" cy="120" r="12" fill="rgba(255,255,255,0.08)"/>
        <circle cx="200" cy="120" r="20" fill="rgba(200,220,255,0.05)"/>
      </svg>

      <!-- Light reflections on shards -->
      <div class="shard" style="--pts:0% 0%,45% 0%,55% 35%,20% 30%; top:10px;left:10px;width:140px;height:90px;"></div>
      <div class="shard" style="--pts:0% 0%,100% 10%,80% 100%,0% 80%; top:10px;left:185px;width:120px;height:80px; opacity:0.5;"></div>
      <div class="shard" style="--pts:20% 0%,100% 20%,100% 100%,0% 60%; top:180px;left:190px;width:110px;height:110px; opacity:0.4;"></div>
    </div>

    <div class="glass-sheen"></div>
  </div>

  <div class="digital-time" id="digitalTime">00:00:00</div>

  <script>
    // ── Inject hour markers ──
    const face = document.getElementById('clockFace');
    for (let i = 0; i < 60; i++) {
      const m = document.createElement('div');
      m.className = 'marker ' + (i % 5 === 0 ? 'major' : 'minor');
      m.style.transform = `rotate(${i * 6}deg)`;
      face.appendChild(m);
    }

    // ── Clock logic ──
    const hourHand   = document.getElementById('hourHand');
    const minuteHand = document.getElementById('minuteHand');
    const secondHand = document.getElementById('secondHand');
    const digitalTime = document.getElementById('digitalTime');

    function updateClock() {
      const now  = new Date();
      const h    = now.getHours() % 12;
      const m    = now.getMinutes();
      const s    = now.getSeconds();
      const ms   = now.getMilliseconds();

      const sDeg = (s + ms / 1000) * 6;
      const mDeg = (m + s / 60)    * 6;
      const hDeg = (h + m / 60)    * 30;

      secondHand.style.transform = `rotate(${sDeg}deg)`;
      minuteHand.style.transform = `rotate(${mDeg}deg)`;
      hourHand.style.transform   = `rotate(${hDeg}deg)`;

      const pad = n => String(n).padStart(2,'0');
      digitalTime.textContent =
        `${pad(now.getHours())}:${pad(m)}:${pad(s)}`;

      requestAnimationFrame(updateClock);
    }
    updateClock();
  </script>
</body>
</html>
